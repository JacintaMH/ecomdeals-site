backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text", hint: "Short summary shown on blog listing and in Google search results" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Platform Guide", "Roundup", "Beginner Guide", "Conversion", "Email & SMS", "Analytics", "Case Study"]
      - { label: "Featured Image Alt Text", name: "imageAlt", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
