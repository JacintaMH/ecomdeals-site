<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcomDeals — Account Setup</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080C0A;
    color: #F2F5F0;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.25rem;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
  }
  .logo span { color: #3DFF8F; }
  #msg {
    color: #7A9080;
    font-size: 15px;
    font-weight: 300;
    max-width: 320px;
    line-height: 1.6;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #1E2E21;
    border-top-color: #3DFF8F;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="logo">Ecom<span>Deals</span></div>
<div class="spinner" id="spinner"></div>
<p id="msg">Setting up your account...</p>

<script>
  var netlifyIdentity = window.netlifyIdentity;

  netlifyIdentity.on('init', function(user) {
    // Always open the widget on this page — it handles tokens automatically
    netlifyIdentity.open();
  });

  netlifyIdentity.on('login', function(user) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'You\'re in! Redirecting to admin...';
    setTimeout(function() {
      window.location.href = '/admin/';
    }, 1200);
  });

  netlifyIdentity.on('error', function(err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Something went wrong: ' + err;
  });
</script>
</body>
</html>
