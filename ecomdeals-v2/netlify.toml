[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

# Admin panel
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Identity confirmation/recovery handler
[[redirects]]
  from = "/recover"
  to = "/recover/index.html"
  status = 200
